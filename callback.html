<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>認可完了</title>
<style>body{font-family:-apple-system,Segoe UI,sans-serif;max-width:640px;margin:50px auto;padding:0 20px;line-height:1.7}
code{background:#f2f2f2;padding:2px 6px;border-radius:4px;word-break:break-all}
.box{background:#f7f7f9;border:1px solid #ddd;border-radius:8px;padding:16px;margin:14px 0}
button{font-size:16px;padding:8px 16px;border-radius:8px;border:1px solid #333;background:#111;color:#fff;cursor:pointer}</style>
</head><body>
<h2>✅ 認可が完了しました</h2>
<p>下の「URLをコピー」を押して、ターミナルのプロンプトに貼り付けてください。</p>
<div class="box"><div id="url" style="font-size:13px"></div></div>
<button onclick="copyUrl()">URLをコピー</button>
<p id="msg" style="color:green"></p>
<script>
  const full = window.location.href;
  document.getElementById('url').textContent = full;
  function copyUrl(){navigator.clipboard.writeText(full).then(()=>{document.getElementById('msg').textContent='コピーしました。ターミナルに貼り付けてEnter。';});}
</script>
</body></html>
